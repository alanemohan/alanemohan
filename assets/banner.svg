<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff" />
      <stop offset="100%" style="stop-color:#a371f7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Particle dots -->
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Floating orbs -->
  <circle cx="80" cy="80" r="40" fill="url(#dot)" opacity="0.5">
    <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="220" r="50" fill="url(#dot)" opacity="0.4">
    <animate attributeName="cy" values="220;240;220" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="60" r="25" fill="#a371f7" opacity="0.08">
    <animate attributeName="r" values="25;35;25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="230" r="20" fill="#3fb950" opacity="0.07">
    <animate attributeName="r" values="20;28;20" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)" rx="0"/>

  <!-- Code bracket decoration left -->
  <text x="50" y="170" font-family="monospace" font-size="72" fill="#58a6ff" opacity="0.06" font-weight="bold">{</text>
  <!-- Code bracket decoration right -->
  <text x="820" y="170" font-family="monospace" font-size="72" fill="#a371f7" opacity="0.06" font-weight="bold">}</text>

  <!-- Main name -->
  <text x="450" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="2">
    Alane Mohan
  </text>

  <!-- Title line -->
  <text x="450" y="150" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8b949e" letter-spacing="4">
    FULL STACK DEVELOPER  ·  AI ENGINEER  ·  B.TECH CSE
  </text>

  <!-- Animated tagline -->
  <text x="450" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#58a6ff" opacity="0.9" letter-spacing="1">
    Building intelligent software, one commit at a time.
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Tech pills -->
  <g transform="translate(450,230)" text-anchor="middle">
    <!-- React pill -->
    <rect x="-310" y="-13" width="70" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="-275" y="4" font-family="monospace" font-size="11" fill="#58a6ff">⚛ React</text>

    <!-- Node pill -->
    <rect x="-225" y="-13" width="70" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="-190" y="4" font-family="monospace" font-size="11" fill="#3fb950">⬡ Node</text>

    <!-- AI pill -->
    <rect x="-140" y="-13" width="60" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="-110" y="4" font-family="monospace" font-size="11" fill="#a371f7">✦ AI</text>

    <!-- Python pill -->
    <rect x="-65" y="-13" width="80" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="-25" y="4" font-family="monospace" font-size="11" fill="#f0c000">🐍 Python</text>

    <!-- Next.js pill -->
    <rect x="30" y="-13" width="76" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="68" y="4" font-family="monospace" font-size="11" fill="#e6edf3">▲ Next.js</text>

    <!-- MCP pill -->
    <rect x="121" y="-13" width="65" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="153" y="4" font-family="monospace" font-size="11" fill="#ff7b72">⚡ MCP</text>

    <!-- TypeScript pill -->
    <rect x="201" y="-13" width="100" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="251" y="4" font-family="monospace" font-size="11" fill="#58a6ff">TS TypeScript</text>
  </g>

  <!-- Accent bar at bottom -->
  <rect x="0" y="297" width="900" height="3" fill="url(#accent)" rx="0"/>
</svg>
